<script>
"use strict";

// ---------------------------------------------------------------- analytics
// No cookies, no visitor identifiers — just a few named event counts on our
// own server. Fire-and-forget: a tracking failure must never affect the app.
function track(event) {
  fetch("/api/track", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ event, path: location.pathname, referrer: document.referrer || null }),
  }).catch(() => {});
}
track("pageview");

const map = L.map("map", { center: [37.02, -76.35], zoom: 10 });

// ---------------------------------------------------------------- base maps
const positron = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  { maxZoom: 19, attribution: "&copy; OpenStreetMap contributors &copy; CARTO" }
).addTo(map);
const imagery = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { maxZoom: 19, attribution: "Esri World Imagery" }
);

// ------------------------------------------------- NOAA sea level rise tiles
// Cached tile services behind the NOAA Sea Level Rise Viewer. Each service
// shows inundation (plus low-lying areas) at N feet above local MHHW.
const slrLayers = {};
for (let ft = 1; ft <= 10; ft++) {
  slrLayers[ft] = L.tileLayer(
    `https://coast.noaa.gov/arcgis/rest/services/dc_slr/slr_${ft}ft/MapServer/tile/{z}/{y}/{x}`,
    { maxZoom: 19, opacity: 0.6, attribution: "NOAA Office for Coastal Management" }
  );
}
let activeSlr = null;
function setSlr(ft) {
  if (activeSlr) { map.removeLayer(slrLayers[activeSlr]); activeSlr = null; }
  if (ft >= 1) { slrLayers[ft].addTo(map); activeSlr = ft; }
  document.getElementById("slr-value").textContent = ft === 0 ? "off" : `${ft} ft`;
}

// ------------------------------------------------------- FEMA flood zones
// FEMA's WMS endpoint rejects requests, so tile the REST export API instead.
const FemaLayer = L.TileLayer.extend({
  getTileUrl(coords) {
    const origin = 20037508.342789244; // Web Mercator world half-width
    const span = (2 * origin) / Math.pow(2, coords.z);
    const xmin = -origin + coords.x * span;
    const ymax = origin - coords.y * span;
    return "https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/export" +
      `?bbox=${xmin},${ymax - span},${xmin + span},${ymax}` +
      "&bboxSR=3857&imageSR=3857&size=256,256&layers=show:28" +
      "&transparent=true&format=png32&f=image";
  },
});
const fema = new FemaLayer("", {
  opacity: 0.55, minZoom: 13, maxZoom: 19,
  attribution: "FEMA National Flood Hazard Layer",
});

// ------------------------------------------------------- district overlays
const overlays = {};
const districtData = {}; // layer label -> raw GeoJSON, for point-in-polygon lookups
// Resolved once every district layer + the station list has loaded, so a
// URL-driven lookup (shared link) can wait for accurate district/gauge data
// instead of racing the initial fetches.
const dataReadyPromises = [];

function districtLayer(url, style, popupFn, layerLabel) {
  const layer = L.geoJSON(null, {
    style,
    onEachFeature: (feature, lyr) => {
      lyr.bindPopup(popupFn(feature.properties));
      lyr.on("mouseover", () => lyr.setStyle({ weight: style.weight + 2 }));
      lyr.on("mouseout", () => lyr.setStyle({ weight: style.weight }));
    },
  });
  const ready = fetch(url)
    .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then((geojson) => { layer.addData(geojson); districtData[layerLabel] = geojson; })
    .catch((err) => console.error(`failed to load ${url}:`, err));
  dataReadyPromises.push(ready);
  overlays[layerLabel] = layer;
  return layer;
}

districtLayer(
  "data/congressional_districts.geojson",
  { color: "#6a3d9a", weight: 2.5, fillOpacity: 0.03, dashArray: null },
  (p) => `<b>Congressional District ${p.DISTRICT}</b><br>2021 SCV Final plan`,
  "Congressional districts (2021)"
);
districtLayer(
  "data/senate_districts.geojson",
  { color: "#e31a1c", weight: 1.8, fillOpacity: 0.03 },
  (p) => `<b>${p.NAME}</b><br>Virginia Senate &middot; GEOID ${p.GEOID}`,
  "State Senate districts (2024)"
);
districtLayer(
  "data/house_districts.geojson",
  { color: "#1f78b4", weight: 1.5, fillOpacity: 0.03 },
  (p) => `<b>${p.NAME}</b><br>House of Delegates &middot; GEOID ${p.GEOID}`,
  "House of Delegates districts (2024)"
);
const localities = districtLayer(
  "data/localities.geojson",
  { color: "#555", weight: 1.2, fillOpacity: 0, dashArray: "4 4" },
  (p) => `<b>${p.NAME}</b>`,
  "City / county boundaries"
);
localities.addTo(map);

// --------------------------------------------------------- NOAA tide gauges
const STATUS_COLORS = {
  major: "#7a0177", moderate: "#d7301f", minor: "#fc8d59",
  action: "#fee08b", normal: "#31a354", unknown: "#999",
};
const STATUS_LABELS = {
  major: "MAJOR FLOODING", moderate: "MODERATE FLOODING", minor: "MINOR FLOODING",
  action: "NEAR FLOOD (action)", normal: "Normal", unknown: "No live data",
};

const gaugeLayer = L.layerGroup();
overlays["Tide gauges (live)"] = gaugeLayer;
gaugeLayer.addTo(map);
const gaugeMarkers = {}; // station id -> circleMarker
let stationsData = [];   // loaded station list, for nearest-gauge lookups

function classify(obs, thresholds) {
  if (obs === null || !thresholds) return "unknown";
  for (const level of ["major", "moderate", "minor", "action"]) {
    if (thresholds[level] !== undefined && obs >= thresholds[level]) return level;
  }
  return "normal";
}

// ------------------------------------------------- next high tide forecast
// Predictions are astronomical (don't need 6-min refresh like observations),
// but "next" is relative to the current moment, so it's recomputed on every
// render from a cached prediction window rather than refetched each time.
const tidePredictions = {}; // station id -> [{t, v, type}]

// All comparisons happen as zero-padded "YYYY-MM-DD HH:MM" strings in the
// station's own Eastern time (what NOAA's API returns) — this sidesteps
// Date/timezone parsing entirely: lexicographic string compare is exact for
// this format, and it stays correct regardless of the visitor's own timezone.
function easternNowParts() {
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", hourCycle: "h23",
  }).formatToParts(new Date());
  const get = (t) => parts.find((p) => p.type === t).value;
  return { date: `${get("year")}-${get("month")}-${get("day")}`, time: `${get("hour")}:${get("minute")}` };
}

function fmtTide12h(hhmm) {
  let [h, m] = hhmm.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2, "0")} ${ampm}`;
}

function tideDeltaText(heightFt, thresholds, status) {
  if (!thresholds || status === "unknown") return "";
  if (status !== "normal") {
    return `${(heightFt - thresholds[status]).toFixed(1)} ft above ${status} stage`;
  }
  const lowestLevel = ["action", "minor", "moderate", "major"].find((l) => thresholds[l] !== undefined);
  if (!lowestLevel) return "";
  return `${(thresholds[lowestLevel] - heightFt).toFixed(1)} ft below ${lowestLevel} stage`;
}

async function fetchTidePredictions(stationId) {
  const beginDate = easternNowParts().date.replace(/-/g, "");
  const url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter" +
    `?station=${stationId}&product=predictions&datum=MLLW&units=english` +
    `&time_zone=lst_ldt&interval=hilo&format=json&begin_date=${beginDate}&range=48`;
  const data = await (await fetch(url)).json();
  return data.predictions || [];
}

// Pure — reads the cached prediction window, doesn't fetch. Safe to call on
// every popup render (e.g. every 6 min) since "next" changes as time passes.
function nextHighTideInfo(stationId, thresholds) {
  const preds = tidePredictions[stationId];
  if (!preds || !preds.length) return null;
  const nowStr = `${easternNowParts().date} ${easternNowParts().time}`;
  const next = preds.find((p) => p.type === "H" && p.t > nowStr);
  if (!next) return null;
  const [predDate, predTime] = next.t.split(" ");
  const heightFt = parseFloat(next.v);
  const status = classify(heightFt, thresholds);
  const todayDate = nowStr.split(" ")[0];
  return {
    timeLabel: fmtTide12h(predTime) + (predDate === todayDate ? "" : " tomorrow"),
    heightFt,
    status,
    deltaText: tideDeltaText(heightFt, thresholds, status),
  };
}

function stationPopup(st, obs, obsTime, status) {
  const badge = `<span class="status-badge" style="background:${STATUS_COLORS[status]};` +
    `${status === "action" ? "color:#333;" : ""}">${STATUS_LABELS[status]}</span>`;
  let rows = "";
  if (st.thresholds_mllw) {
    for (const level of ["action", "minor", "moderate", "major"]) {
      const v = st.thresholds_mllw[level];
      if (v !== undefined) {
        rows += `<tr><td>${level[0].toUpperCase() + level.slice(1)} threshold</td>` +
                `<td>${v.toFixed(2)} ft</td></tr>`;
      }
    }
  }
  const obsHtml = obs === null
    ? "<i>live data unavailable</i>"
    : `<span class="obs">${obs.toFixed(2)} ft</span> MLLW<br><small>${obsTime}</small>`;
  const tide = nextHighTideInfo(st.id, st.thresholds_mllw);
  let tideHtml = "";
  if (tide) {
    const tideColor = STATUS_COLORS[tide.status] || STATUS_COLORS.unknown;
    tideHtml = `<b>Next high tide:</b> ${tide.heightFt.toFixed(1)} ft at ${tide.timeLabel}` +
      (tide.deltaText ? `<br><span style="color:${tideColor}">&mdash; ${tide.deltaText}</span>` : "") +
      "<br><br>";
  }
  return `<div class="station-popup"><b>${st.name}</b> &middot; NOAA ${st.id}<br>` +
         `${badge}<br><br>${obsHtml}<br><br>${tideHtml}` +
         (rows ? `<table>${rows}</table>` : "<i>no NWS flood thresholds published</i>") +
         `<br><small>Heights in feet above MLLW &middot; refreshes every 6 min</small></div>`;
}

async function refreshStation(st) {
  let obs = null;
  let obsTime = "";
  try {
    const url = "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter" +
      `?date=latest&station=${st.id}&product=water_level&datum=MLLW` +
      "&units=english&time_zone=lst_ldt&format=json";
    const data = await (await fetch(url)).json();
    if (data.data && data.data.length) {
      obs = parseFloat(data.data[0].v);
      obsTime = data.data[0].t + " local";
    }
  } catch (err) {
    console.error(`station ${st.id}:`, err);
  }
  const status = classify(obs, st.thresholds_mllw);
  const marker = gaugeMarkers[st.id];
  marker.setStyle({ fillColor: STATUS_COLORS[status] });
  marker.setPopupContent(stationPopup(st, obs, obsTime, status));
}

async function refreshTidePredictions(stations) {
  await Promise.all(stations.map(async (st) => {
    try {
      tidePredictions[st.id] = await fetchTidePredictions(st.id);
    } catch (err) {
      console.error(`tide predictions ${st.id}:`, err);
    }
  }));
}

dataReadyPromises.push(fetch("data/stations.json")
  .then((r) => r.json())
  .then(async (stations) => {
    stationsData = stations;
    for (const st of stations) {
      const marker = L.circleMarker([st.lat, st.lon], {
        radius: 9, weight: 1.5, color: "#333",
        fillColor: STATUS_COLORS.unknown, fillOpacity: 0.95,
      }).addTo(gaugeLayer);
      marker.bindPopup(stationPopup(st, null, "", "unknown"), { minWidth: 220 });
      gaugeMarkers[st.id] = marker;
    }
    await refreshTidePredictions(stations); // before first render, so it's not empty
    const refreshAll = () => stations.forEach(refreshStation);
    refreshAll();
    setInterval(refreshAll, 6 * 60 * 1000);
    // Predictions are astronomical — they don't need a 6-min refresh, just a
    // periodic top-up so the cached 48h window doesn't run dry in a long-open tab.
    setInterval(() => refreshTidePredictions(stations), 6 * 60 * 60 * 1000);
  })
  .catch((err) => console.error("failed to load stations.json:", err)));

// City council flood-vote data, only available for the cities VoteIQ has
// scraped council records for (Norfolk, Virginia Beach) — a static export,
// never a live query, so there's no runtime coupling to VoteIQ at all.
let civicData = {};
dataReadyPromises.push(fetch("data/civic_flood_watch.json")
  .then((r) => r.json())
  .then((data) => { civicData = data; })
  .catch((err) => console.error("failed to load civic_flood_watch.json:", err)));

const dataReady = Promise.all(dataReadyPromises);

// ----------------------------------------------------- NWS flood alerts
// Region banner: pull all active VA alerts, keep flood-related events that
// name a Hampton Roads locality. areaDesc can span states (a VA alert may
// list NC's Surry County), so this is deliberately flood-filtered and
// word-bounded; slightly over-inclusive beats missing a live warning.
const FLOOD_EVENT_RE = /flood|hurricane|tropical|surge|tsunami/i;
const HR_LOCALITY_RE = new RegExp(
  "\\b(Norfolk|Virginia Beach|Chesapeake|Portsmouth|Suffolk|Hampton|Newport News|" +
  "Poquoson|York|James City|Williamsburg|Gloucester|Isle of Wight|Surry|" +
  "Southampton|Franklin)\\b");
const SEVERITY_COLORS = { Extreme: "#7a0177", Severe: "#b30000", Moderate: "#e07000", Minor: "#c9a400" };
const SEVERITY_RANK = { Extreme: 0, Severe: 1, Moderate: 2, Minor: 3 };

const dismissedAlertIds = new Set();

function fmtAlertEnd(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return "until " + d.toLocaleString([], { weekday: "short", hour: "numeric", minute: "2-digit" });
}

function renderAlertBanner(alerts) {
  const banner = document.getElementById("alert-banner");
  const body = document.getElementById("alert-banner-body");
  const visible = alerts.filter((a) => !dismissedAlertIds.has(a.id));
  if (!visible.length) { banner.style.display = "none"; return; }
  visible.sort((a, b) => (SEVERITY_RANK[a.severity] ?? 9) - (SEVERITY_RANK[b.severity] ?? 9));
  body.innerHTML = visible.map((a) => {
    const color = SEVERITY_COLORS[a.severity] || "#888";
    const desc = (a.description || "").trim().slice(0, 600);
    return `<details class="alert-item">
       <summary><span class="alert-sev" style="background:${color}">${a.severity || "?"}</span>
       ⚠ ${a.event} <span class="alert-when">${fmtAlertEnd(a.ends)}</span></summary>
       <p><b>${a.headline || ""}</b></p>
       <p>${a.areaDesc || ""}</p>
       ${desc ? `<p>${desc}&hellip;</p>` : ""}
     </details>`;
  }).join("");
  banner.style.display = "block";
}

let _lastAlerts = [];
async function refreshFloodAlerts() {
  try {
    const data = await (await fetch("https://api.weather.gov/alerts/active?area=VA")).json();
    _lastAlerts = (data.features || [])
      .map((f) => ({ id: f.properties.id || f.id, ...f.properties }))
      .filter((p) => FLOOD_EVENT_RE.test(p.event || "") && HR_LOCALITY_RE.test(p.areaDesc || ""));
    renderAlertBanner(_lastAlerts);
  } catch (err) {
    console.error("NWS alerts fetch failed:", err);
  }
}

function dismissAlerts() {
  _lastAlerts.forEach((a) => dismissedAlertIds.add(a.id));
  document.getElementById("alert-banner").style.display = "none";
}

refreshFloodAlerts();
setInterval(refreshFloodAlerts, 5 * 60 * 1000);

// Per-property: NWS resolves the point to its alert polygons/zones server-side.
async function queryPointAlerts(lon, lat) {
  const url = `https://api.weather.gov/alerts/active?point=${lat.toFixed(4)},${lon.toFixed(4)}`;
  const data = await (await fetch(url)).json();
  return (data.features || [])
    .map((f) => f.properties)
    .filter((p) => FLOOD_EVENT_RE.test(p.event || ""))
    .map((p) => ({
      event: p.event,
      severity: p.severity,
      headline: p.headline,
      ends: p.ends || p.expires,
    }));
}

// ---------------------------------------------------- property flood lookup
// Even-odd ray casting across all rings, so holes are handled correctly.
function ringsContain(rings, lon, lat) {
  let inside = false;
  for (const ring of rings) {
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const [xi, yi] = ring[i];
      const [xj, yj] = ring[j];
      if ((yi > lat) !== (yj > lat) &&
          lon < ((xj - xi) * (lat - yi)) / (yj - yi) + xi) {
        inside = !inside;
      }
    }
  }
  return inside;
}

function findDistrict(layerLabel, lon, lat) {
  const geojson = districtData[layerLabel];
  if (!geojson) return null;
  for (const feature of geojson.features) {
    const geom = feature.geometry;
    const polys = geom.type === "MultiPolygon" ? geom.coordinates
      : geom.type === "Polygon" ? [geom.coordinates] : [];
    if (polys.some((rings) => ringsContain(rings, lon, lat))) {
      return feature.properties;
    }
  }
  return null;
}

async function queryFemaZone(lon, lat) {
  const url = "https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/28/query" +
    `?geometry=${lon},${lat}&geometryType=esriGeometryPoint&inSR=4326` +
    "&spatialRel=esriSpatialRelIntersects&outFields=FLD_ZONE,ZONE_SUBTY,STATIC_BFE" +
    "&returnGeometry=false&f=json";
  const data = await (await fetch(url)).json();
  if (!data.features || !data.features.length) return { text: "Not in a mapped FEMA flood zone here", color: "#31a354" };
  const { FLD_ZONE: zone, ZONE_SUBTY: subty, STATIC_BFE: rawBfe } = data.features[0].attributes;
  // NFHL uses -9999 as the null sentinel for BFE
  const bfe = rawBfe !== null && rawBfe > -1000 ? rawBfe : null;
  const classify = () => {
    if (subty && subty.includes("OPEN WATER")) return { text: "Open water", color: "#555" };
    if (zone && zone.startsWith("V")) {
      return { text: `Zone ${zone} — high risk: 1% annual chance flood with coastal wave hazard`, color: "#d7301f" };
    }
    if (zone && zone.startsWith("A")) {
      return { text: `Zone ${zone} — high risk: 1% annual chance (100-year) floodplain`, color: "#d7301f" };
    }
    if (zone === "X" && subty && subty.includes("0.2 PCT")) {
      return { text: "Zone X (shaded) — moderate risk: 0.2% annual chance (500-year)", color: "#fc8d59" };
    }
    if (zone === "X") return { text: "Zone X — minimal flood hazard", color: "#31a354" };
    if (zone === "D") return { text: "Zone D — flood risk not determined", color: "#999" };
    return { text: `Zone ${zone}${subty ? " (" + subty.toLowerCase() + ")" : ""}`, color: "#999" };
  };
  return { ...classify(), zone, bfe };
}

async function queryElevation(lon, lat) {
  const url = "https://epqs.nationalmap.gov/v1/json" +
    `?x=${lon}&y=${lat}&units=Feet&wkid=4326&includeDate=false`;
  const data = await (await fetch(url)).json();
  const value = parseFloat(data.value);
  // EPQS returns a large negative sentinel where lidar has no data
  if (!isFinite(value) || value < -400) throw new Error("no elevation data");
  return value;
}

// NFIP claims for the census tract containing the point. Claims are coded to
// 2010 tracts (older records) or 2020 tracts, so resolve both vintages and
// query with an OR filter.
async function queryClaims(lon, lat) {
  const fccUrl = (year) => "https://geo.fcc.gov/api/census/block/find" +
    `?latitude=${lat}&longitude=${lon}&censusYear=${year}&format=json`;
  const blocks = await Promise.all([2010, 2020].map((y) =>
    fetch(fccUrl(y)).then((r) => r.json())));
  const tracts = [...new Set(blocks
    .map((b) => b.Block && b.Block.FIPS ? b.Block.FIPS.slice(0, 11) : null)
    .filter(Boolean))];
  if (!tracts.length) throw new Error("no census tract at point");
  const filter = tracts.map((t) => `censusTract eq '${t}'`).join(" or ");
  const url = "https://www.fema.gov/api/open/v2/FimaNfipClaims" +
    `?$filter=${encodeURIComponent(filter)}` +
    "&$select=yearOfLoss,amountPaidOnBuildingClaim,amountPaidOnContentsClaim" +
    "&$top=10000&$format=json";
  const data = await (await fetch(url)).json();
  const claims = data.FimaNfipClaims || [];
  let totalPaid = 0;
  let lastYear = null;
  for (const c of claims) {
    totalPaid += (c.amountPaidOnBuildingClaim || 0) + (c.amountPaidOnContentsClaim || 0);
    if (c.yearOfLoss && (!lastYear || c.yearOfLoss > lastYear)) lastYear = c.yearOfLoss;
  }
  return { count: claims.length, totalPaid, lastYear };
}

function formatMoney(n) {
  if (n >= 1e6) return `$${(n / 1e6).toFixed(1)}M`;
  if (n >= 1e3) return `$${Math.round(n / 1e3)}k`;
  return `$${Math.round(n)}`;
}

async function querySlr(lon, lat) {
  const extent = `${lon - 0.01},${lat - 0.01},${lon + 0.01},${lat + 0.01}`;
  const probe = async (ft) => {
    const url = `https://coast.noaa.gov/arcgis/rest/services/dc_slr/slr_${ft}ft/MapServer/identify` +
      `?geometry=${lon},${lat}&geometryType=esriGeometryPoint&sr=4326&layers=all` +
      `&tolerance=1&mapExtent=${extent}&imageDisplay=400,400,96&returnGeometry=false&f=json`;
    const data = await (await fetch(url)).json();
    const names = (data.results || []).map((r) => r.layerName || "");
    return {
      ft,
      inundated: names.some((n) => n.includes("Depth")),
      lowlying: names.some((n) => n.includes("Low-lying")),
    };
  };
  const results = await Promise.allSettled([...Array(10)].map((_, i) => probe(i + 1)));
  const ok = results.filter((r) => r.status === "fulfilled").map((r) => r.value);
  if (!ok.length) throw new Error("all SLR probes failed");
  const inundatedFt = ok.filter((r) => r.inundated).map((r) => r.ft).sort((a, b) => a - b)[0];
  const lowlyingFt = ok.filter((r) => r.lowlying).map((r) => r.ft).sort((a, b) => a - b)[0];
  if (inundatedFt !== undefined) {
    return { text: `Inundated at +${inundatedFt} ft of sea level rise`, color: inundatedFt <= 3 ? "#d7301f" : "#fc8d59" };
  }
  if (lowlyingFt !== undefined) {
    return { text: `Low-lying (potentially isolated) area at +${lowlyingFt} ft of sea level rise`, color: "#fc8d59" };
  }
  return { text: "Not inundated in NOAA scenarios up to +10 ft", color: "#31a354" };
}

function nearestGauge(lon, lat) {
  if (!stationsData.length) return null;
  const toRad = (d) => (d * Math.PI) / 180;
  let best = null;
  for (const st of stationsData) {
    const dLat = toRad(st.lat - lat);
    const dLon = toRad(st.lon - lon);
    const a = Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat)) * Math.cos(toRad(st.lat)) * Math.sin(dLon / 2) ** 2;
    const miles = 3959 * 2 * Math.asin(Math.sqrt(a));
    if (!best || miles < best.miles) best = { st, miles };
  }
  return best;
}

let lookupMarker = null;
let lastLookup = null; // structured result of the latest lookup, for the AI report

// Client-side result cache: repeat lookups of the same spot (a re-clicked
// demo chip, a reloaded shared URL, a search that geocodes to a point
// already checked) skip NOAA/FEMA/USGS/OpenFEMA entirely instead of
// re-fetching from scratch. Keyed to 5 decimal places (~1 m) — the same
// rounding already used for the shareable-URL lat/lon, so a reload of that
// exact URL is a guaranteed cache hit. Short TTL because tide forecasts and
// NWS alerts are time-sensitive, not because the FEMA zone or elevation
// would ever change — this is a "don't hammer free public APIs on obvious
// repeats within one visit" cache, not a long-term one.
const lookupCache = new Map();
const LOOKUP_CACHE_TTL_MS = 5 * 60 * 1000;

// All the network + district lookups for one point, cache-eligible as a
// whole since every piece is a pure function of (lat, lon).
async function computeLookupData(lat, lon) {
  const [femaRes, slrRes, elevRes, claimsRes, alertsRes] = await Promise.allSettled([
    queryFemaZone(lon, lat), querySlr(lon, lat),
    queryElevation(lon, lat), queryClaims(lon, lat),
    queryPointAlerts(lon, lat),
  ]);
  const unavailable = { text: "unavailable right now", color: "#999" };
  const femaZone = femaRes.status === "fulfilled" ? femaRes.value : unavailable;
  const slr = slrRes.status === "fulfilled" ? slrRes.value : unavailable;
  const elevation = elevRes.status === "fulfilled" ? elevRes.value : null;
  const claims = claimsRes.status === "fulfilled" ? claimsRes.value : null;
  const pointAlerts = alertsRes.status === "fulfilled" ? alertsRes.value : null;

  const cd = findDistrict("Congressional districts (2021)", lon, lat);
  const senate = findDistrict("State Senate districts (2024)", lon, lat);
  const house = findDistrict("House of Delegates districts (2024)", lon, lat);
  const locality = findDistrict("City / county boundaries", lon, lat);
  const gauge = nearestGauge(lon, lat);
  const civic = locality ? civicData[locality.NAME] : null;

  return {
    femaRes, slrRes, femaZone, slr, elevation, claims, pointAlerts,
    cd, senate, house, locality, gauge, civic,
  };
}

async function riskLookup(lat, lon, label) {
  if (!lookupMarker) {
    lookupMarker = L.marker([lat, lon], { draggable: true }).addTo(map);
    lookupMarker.bindPopup("", { minWidth: 260, maxWidth: 320 });
    lookupMarker.on("dragend", () => {
      const p = lookupMarker.getLatLng();
      riskLookup(p.lat, p.lng, null);
    });
  } else {
    lookupMarker.setLatLng([lat, lon]);
  }

  // Leaflet's popup autoPan only avoids the map viewport edges — it has no
  // idea our title panel is a fixed overlay sitting on top of the map, so a
  // popup can open right underneath it. Reserve down to the panel's bottom
  // edge (not just its own height — the zoom +/- control stacks above it in
  // the same corner, so the panel itself doesn't start at y=0).
  const panelEl = document.querySelector(".leaflet-top.leaflet-left .panel");
  const reserveTop = panelEl ? panelEl.getBoundingClientRect().bottom + 15 : 15;
  lookupMarker.getPopup().options.autoPanPaddingTopLeft = L.point(10, reserveTop);

  const cacheKey = `${lat.toFixed(5)},${lon.toFixed(5)}`;
  const cached = lookupCache.get(cacheKey);
  const isFreshHit = cached && Date.now() - cached.ts < LOOKUP_CACHE_TTL_MS;
  if (!isFreshHit) {
    lookupMarker.setPopupContent("<div class='risk-popup'>Checking flood risk&hellip;</div>").openPopup();
  }

  const data = isFreshHit ? cached.data : await computeLookupData(lat, lon);
  if (!isFreshHit) lookupCache.set(cacheKey, { ts: Date.now(), data });

  const { femaRes, slrRes, femaZone, slr, elevation, claims, pointAlerts,
          cd, senate, house, locality, gauge, civic } = data;

  let alertLine = "";
  if (pointAlerts && pointAlerts.length) {
    alertLine = pointAlerts.map((a) =>
      `<span class="popup-alert">⚠ ${a.event} ${fmtAlertEnd(a.ends)}</span><br>`
    ).join("");
  }

  let elevLine = "";
  if (elevation !== null) {
    elevLine = `<b>Ground elevation:</b> ${elevation.toFixed(1)} ft (NAVD88)`;
    if (femaZone.bfe != null) {
      const delta = elevation - femaZone.bfe;
      const rel = delta >= 0 ? "above" : "below";
      elevLine += ` &middot; base flood elevation ${femaZone.bfe} ft ` +
        `(ground ${Math.abs(delta).toFixed(1)} ft ${rel} BFE)`;
    }
    elevLine += "<br>";
  }

  let claimsLine = "";
  if (claims !== null) {
    claimsLine = claims.count === 0
      ? "<b>NFIP claims:</b> none recorded in this census tract<br>"
      : `<b>NFIP claims:</b> ${claims.count.toLocaleString()} in this census tract ` +
        `(${formatMoney(claims.totalPaid)} paid, most recent ${claims.lastYear})<br>`;
  }

  const reps = [
    cd && `Congressional District ${cd.DISTRICT}`,
    senate && senate.NAME,
    house && house.NAME,
  ].filter(Boolean);

  let civicHtml = "";
  if (civic && (civic.recent_flood_actions.length || civic.member_alignment.length)) {
    const actionsHtml = civic.recent_flood_actions.slice(0, 4).map((a) =>
      `<div class="civic-action">${a.title}<br>` +
      `<span class="civic-date">${a.date} &middot; ${a.result}</span></div>`
    ).join("");
    const signalsHtml = civic.member_alignment.slice(0, 2).map((m) =>
      `<div class="civic-signal">${m.signal_text}</div>`
    ).join("");
    const asOf = civic.donor_data_as_of ? civic.donor_data_as_of.slice(0, 10) : null;
    civicHtml = `<details class="civic-panel">
       <summary>City Council Flood Watch (${locality.NAME.replace(" city", "")})</summary>
       ${actionsHtml || "<div class='civic-note'>No recent flood/stormwater actions found.</div>"}
       ${signalsHtml}
       <div class="civic-note">Citywide council data, not specific to a single district or
       address. Donor-vote figures show adjacency only, not causation${asOf ? ` (as of ${asOf})` : ""}.</div>
     </details>`;
  }

  lastLookup = {
    address: label || null,
    lat: +lat.toFixed(5),
    lon: +lon.toFixed(5),
    locality: locality ? locality.NAME : null,
    fema_flood_zone: femaRes.status === "fulfilled"
      ? { zone: femaZone.zone || null, summary: femaZone.text,
          base_flood_elevation_ft_navd88: femaZone.bfe ?? null }
      : null,
    sea_level_rise: slrRes.status === "fulfilled" ? slr.text : null,
    ground_elevation_ft_navd88: elevation !== null ? +elevation.toFixed(1) : null,
    nfip_claims_in_census_tract: claims,
    active_nws_flood_alerts: pointAlerts,
    represented_by: reps,
    nearest_tide_gauge: gauge
      ? { name: gauge.st.name, miles: +gauge.miles.toFixed(1),
          flood_thresholds_ft_mllw: gauge.st.thresholds_mllw,
          next_high_tide: nextHighTideInfo(gauge.st.id, gauge.st.thresholds_mllw) }
      : null,
    city_council_flood_watch: civic || null,
  };
  track("lookup");

  // Make this exact lookup shareable: encode lat/lon (exact replay, no
  // geocoding needed) and the label (for the URL's readability) as query
  // params, without adding a history entry per drag/click.
  const params = new URLSearchParams({ lat: lastLookup.lat, lon: lastLookup.lon });
  if (label) params.set("address", label);
  history.replaceState(null, "", "?" + params.toString());

  lookupMarker.setPopupContent(
    `<div class="risk-popup">
       <h3>${label || `${lat.toFixed(5)}, ${lon.toFixed(5)}`}</h3>
       ${locality ? `<small>${locality.NAME}</small><br>` : ""}
       ${alertLine}
       <b>FEMA:</b> <span class="zone-badge" style="background:${femaZone.color}">&nbsp;</span>
       ${femaZone.text}<br>
       <b>Sea level rise:</b> <span class="zone-badge" style="background:${slr.color}">&nbsp;</span>
       ${slr.text}<br>
       ${elevLine}${claimsLine}
       <b>Represented by:</b>
       ${reps.length ? `<ul>${reps.map((r) => `<li>${r}</li>`).join("")}</ul>` : " outside loaded district data<br>"}
       ${civicHtml}
       ${gauge ? `<b>Nearest tide gauge:</b> ${gauge.st.name} (${gauge.miles.toFixed(1)} mi)<br>` : ""}
       ${lastLookup.nearest_tide_gauge && lastLookup.nearest_tide_gauge.next_high_tide
         ? (t => `<b>Next high tide:</b> ${t.heightFt.toFixed(1)} ft at ${t.timeLabel}` +
             (t.deltaText ? ` &mdash; ${t.deltaText}` : "") + "<br>")(lastLookup.nearest_tide_gauge.next_high_tide)
         : ""}
       <button class="ai-btn" onclick="generateReport()">Generate AI report</button>
       <small>Drag the pin or right-click the map to check another spot.
       Screening info only — not a flood insurance determination.</small>
       <div id="feedback-area">
         <a class="feedback-link" onclick="showFeedbackForm()">Report an issue with this data</a>
       </div>
     </div>`
  );

  // setPopupContent() alone doesn't re-run Leaflet's autoPan for the popup's
  // real (much taller) size — on a fresh lookup it only ran once, against
  // the tiny "Checking flood risk…" placeholder; on a cache hit the popup
  // may be closed entirely (the user dismissed it since the last lookup at
  // this spot). Unconditional close+open handles both: closePopup() on an
  // already-closed popup is a harmless no-op, and openPopup() always
  // recalculates autoPan against the real content just set above.
  lookupMarker.closePopup();
  lookupMarker.openPopup();
}

const addrStatus = () => document.getElementById("addr-status");

function collapsePanelOnMobile() {
  if (window.innerWidth >= 480) return;
  const body = document.getElementById("panel-body");
  const toggle = document.getElementById("panel-toggle");
  if (body && !body.classList.contains("collapsed")) {
    body.classList.add("collapsed");
    toggle.textContent = "▾";
  }
}

async function searchAddress() {
  const q = document.getElementById("addr").value.trim();
  if (!q) return;
  collapsePanelOnMobile(); // give the result popup full room on narrow screens
  addrStatus().textContent = "Searching…";
  try {
    // viewbox biases results toward Hampton Roads without excluding elsewhere
    const url = "https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1" +
      "&countrycodes=us&viewbox=-77.6,37.7,-75.55,36.5&q=" + encodeURIComponent(q);
    const results = await (await fetch(url)).json();
    if (!results.length) {
      addrStatus().textContent = "Address not found — try adding city and VA.";
      return;
    }
    const { lat, lon, display_name } = results[0];
    const latN = parseFloat(lat);
    const lonN = parseFloat(lon);
    const inRegion = lonN > -77.6 && lonN < -75.55 && latN > 36.5 && latN < 37.7;
    addrStatus().textContent = inRegion ? "" : "Note: outside Hampton Roads — flood layers may not cover this spot.";
    map.setView([latN, lonN], 16);
    riskLookup(latN, lonN, display_name.split(",").slice(0, 3).join(","));
  } catch (err) {
    console.error("geocode failed:", err);
    addrStatus().textContent = "Address search unavailable right now.";
  }
}

map.on("contextmenu", (e) => riskLookup(e.latlng.lat, e.latlng.lng, null));

// -------------------------------------------------------------- feedback
function showFeedbackForm() {
  const area = document.getElementById("feedback-area");
  if (!area) return;
  area.innerHTML =
    `<div class="feedback-form">
       <textarea id="feedback-msg" rows="2" maxlength="2000"
         placeholder="What looks wrong? (e.g. wrong flood zone, address in wrong spot)"></textarea>
       <div class="feedback-actions">
         <button onclick="submitFeedback()">Send</button>
         <a onclick="cancelFeedback()">Cancel</a>
       </div>
     </div>`;
  document.getElementById("feedback-msg").focus();
}

function cancelFeedback() {
  const area = document.getElementById("feedback-area");
  if (!area) return;
  area.innerHTML = `<a class="feedback-link" onclick="showFeedbackForm()">Report an issue with this data</a>`;
}

async function submitFeedback() {
  const textarea = document.getElementById("feedback-msg");
  const message = textarea.value.trim();
  const area = document.getElementById("feedback-area");
  if (!message) { textarea.focus(); return; }
  try {
    const resp = await fetch("/api/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message, lookup: lastLookup }),
    });
    if (!resp.ok) {
      const detail = (await resp.json().catch(() => ({}))).detail || resp.statusText;
      throw new Error(detail);
    }
    area.innerHTML = `<span class="feedback-link" style="text-decoration:none">Thanks — noted.</span>`;
  } catch (err) {
    area.querySelector(".feedback-form").insertAdjacentHTML(
      "beforeend", `<div class="feedback-error">${err.message}</div>`
    );
  }
}

// ------------------------------------------------------------ AI report
// Minimal markdown rendering: escape everything, then ## headings and **bold**.
function renderReportMarkdown(text) {
  const escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  return escaped.split(/\n{2,}/).map((chunk) => {
    const t = chunk.trim();
    const heading = t.match(/^(#{1,3}) /);
    if (heading) {
      const [head, ...rest] = t.split("\n");
      return `<h4>${head.slice(heading[1].length + 1)}</h4>` +
        (rest.length ? `<p>${rest.join("<br>")}</p>` : "");
    }
    return `<p>${t.replace(/\n/g, "<br>")}</p>`;
  }).join("").replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
}

async function generateReport() {
  if (!lastLookup) return;
  const panel = document.getElementById("report-panel");
  const body = document.getElementById("report-body");
  panel.style.display = "block";
  body.innerHTML = "<p class='report-note'>Generating report&hellip;</p>";
  try {
    const resp = await fetch("/api/report", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ lookup: lastLookup }),
    });
    if (!resp.ok) {
      const detail = (await resp.json().catch(() => ({}))).detail || resp.statusText;
      const err = new Error(detail);
      err.status = resp.status;
      throw err;
    }
    const data = await resp.json();
    body.innerHTML =
      `<p class='report-note'>${lastLookup.address || `${lastLookup.lat}, ${lastLookup.lon}`}</p>` +
      renderReportMarkdown(data.report) +
      `<p class='report-note'>Generated by Claude (${data.model}) from the queried data only.
       Screening info — not a flood insurance determination.</p>`;
    document.getElementById("print-date").textContent =
      new Date().toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
    track("ai_report");
  } catch (err) {
    const hint = err.status === 429
      ? "<p class='report-note'>Please wait before requesting another report.</p>"
      : `<p class='report-note'>The AI report needs the Python backend. Run
         <code>python server.py --port 8642</code> in the project folder
         (with an Anthropic API key available) and reload this page.</p>`;
    body.innerHTML = `<p><b>Report unavailable:</b> ${err.message}</p>${hint}`;
  }
}

// Shareable-link bootstrap: ?lat=&lon=(&address=) replays a lookup exactly,
// no geocoding round trip. ?address= alone (no coords) falls back to the
// normal geocode path. Waits for district/gauge data so the replayed
// popup matches what the original visitor saw, not a partial one.
(function bootstrapFromUrl() {
  const params = new URLSearchParams(location.search);
  const lat = parseFloat(params.get("lat"));
  const lon = parseFloat(params.get("lon"));
  const address = params.get("address");
  if (isFinite(lat) && isFinite(lon)) {
    dataReady.then(() => {
      map.setView([lat, lon], 16);
      riskLookup(lat, lon, address || null);
    });
  } else if (address) {
    document.getElementById("addr").value = address;
    dataReady.then(searchAddress);
  }
})();
